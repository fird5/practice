<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Masterchef LMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: #f3f4f6; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        .sidebar-transition { transition: transform 0.3s ease-in-out; }
    </style>
</head>
<body class="overflow-x-hidden">

    <!-- Header -->
    <header class="sticky top-0 z-50 bg-[#121212]/95 backdrop-blur-md border-b border-gray-800 px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <button class="p-1 hover:bg-gray-800 rounded-lg text-cyan-400">
                <i class="fas fa-chevron-left text-xl"></i>
            </button>
            <div class="hidden sm:block h-8 w-[1px] bg-gray-800 mx-1"></div>
            <div>
                <h1 class="text-[10px] font-bold text-orange-500 tracking-widest uppercase flex items-center gap-1">
                    <i class="fas fa-bolt"></i> LAPA ACADEMY
                </h1>
                <p id="course-title-header" class="text-sm font-black text-white truncate max-w-[160px] sm:max-w-none uppercase">
                    AI MASTERCHEF: ESSENTIALS
                </p>
            </div>
        </div>
        
        <div class="flex items-center gap-3">
            <div class="hidden md:flex flex-col items-end mr-2">
                <p class="text-[10px] text-gray-500 uppercase font-bold tracking-wider">Course Progress</p>
                <div class="flex items-center gap-2">
                    <div class="w-24 h-1.5 bg-gray-800 rounded-full overflow-hidden">
                        <div id="progress-bar-top" class="h-full bg-cyan-500" style="width: 0%"></div>
                    </div>
                    <p id="progress-text-top" class="text-xs font-bold text-cyan-400">0%</p>
                </div>
            </div>
            <button onclick="toggleSidebar()" class="bg-gray-900 p-2.5 rounded-xl border border-gray-800 hover:border-cyan-500 transition-all shadow-lg active:scale-95">
                <i class="fas fa-bars text-cyan-400"></i>
            </button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto pb-32">
        <!-- Video Player -->
        <section class="relative aspect-video bg-black shadow-2xl shadow-cyan-900/10 group overflow-hidden">
            <div id="video-placeholder" class="video-container">
                <!-- Iframe injected by JS -->
            </div>
        </section>

        <!-- Mobile Progress Bar -->
        <div class="w-full h-1 bg-gray-800 md:hidden">
            <div id="progress-bar-mobile" class="h-full bg-cyan-500 transition-all duration-500" style="width: 0%"></div>
        </div>

        <!-- Lesson Info Bar -->
        <div class="px-6 py-2 bg-[#121212] border-b border-gray-800 flex justify-end">
            <a id="youtube-link" href="#" target="_blank" class="text-[10px] font-bold text-cyan-500 hover:text-cyan-400 flex items-center gap-1.5 uppercase tracking-widest">
               Open in YouTube <i class="fas fa-external-link-alt"></i>
            </a>
        </div>

        <!-- Content Area -->
        <div class="p-6">
            <div class="flex flex-col sm:flex-row sm:justify-between sm:items-start gap-4 mb-6">
                <div class="flex-1">
                    <div class="flex items-center gap-2 mb-2">
                        <span id="lesson-category" class="text-[10px] font-bold bg-orange-600/20 text-orange-400 px-2.5 py-1 rounded border border-orange-500/20 uppercase tracking-widest"></span>
                        <span id="lesson-module-tag" class="text-[10px] font-bold bg-cyan-600/20 text-cyan-400 px-2.5 py-1 rounded border border-cyan-500/20 uppercase tracking-widest"></span>
                    </div>
                    <h2 id="lesson-title" class="text-3xl font-black text-white leading-tight uppercase"></h2>
                </div>
                <div class="flex items-center gap-1.5 text-gray-400 bg-gray-900 px-3 py-1.5 rounded-lg border border-gray-800">
                    <i class="far fa-clock text-cyan-500"></i>
                    <span id="lesson-duration" class="text-xs font-bold"></span>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-8 border-t border-gray-800 pt-8">
                <div class="md:col-span-2">
                    <h3 class="text-xs font-black text-gray-500 uppercase tracking-widest mb-4 flex items-center gap-2">
                        <i class="fas fa-book-open"></i> Lesson Briefing
                    </h3>
                    <p id="lesson-description" class="text-gray-400 leading-relaxed text-lg mb-8"></p>

                    <h3 class="text-xs font-black text-gray-500 uppercase tracking-widest mb-4 flex items-center gap-2">
                        <i class="fas fa-bullseye text-orange-400"></i> Key Outcomes
                    </h3>
                    <ul id="lesson-outcomes" class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        <!-- Outcomes injected by JS -->
                    </ul>
                </div>

                <div class="space-y-4">
                    <div class="bg-gradient-to-br from-[#121212] to-[#0a0a0a] border border-gray-800 rounded-2xl p-5 shadow-xl">
                        <h4 class="text-xs font-bold text-orange-500 uppercase mb-4 tracking-tighter flex items-center gap-2">
                            <i class="fas fa-award"></i> Potential Impact
                        </h4>
                        <div class="space-y-4">
                            <div class="flex justify-between items-end border-b border-gray-800 pb-3">
                                <span class="text-sm text-gray-400">Skill Points</span>
                                <span class="text-xl font-black text-white">+150 XP</span>
                            </div>
                            <div class="flex justify-between items-end border-b border-gray-800 pb-3">
                                <span class="text-sm text-gray-400">Mastery Bonus</span>
                                <span class="text-xl font-black text-cyan-400">2.5x</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Fixed Bottom Button -->
    <div class="fixed bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-black via-black/95 to-transparent z-40">
        <div class="max-w-4xl mx-auto">
            <button id="complete-btn" onclick="markCompleted()" class="w-full flex items-center justify-center gap-3 py-4 rounded-2xl font-black text-lg transition-all transform active:scale-95 shadow-2xl bg-gradient-to-r from-cyan-500 to-blue-600 text-white shadow-cyan-500/40">
                <i class="fas fa-play"></i> Mark as Completed
            </button>
        </div>
    </div>

    <!-- Sidebar Drawer -->
    <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/90 backdrop-blur-md z-[100] hidden opacity-0 transition-opacity duration-300"></div>
    <div id="sidebar" class="fixed right-0 top-0 bottom-0 w-full sm:w-[400px] bg-[#0d0d0d] border-l border-gray-800 z-[101] translate-x-full sidebar-transition flex flex-col">
        <div class="p-6 flex items-center justify-between border-b border-gray-800 bg-[#121212]">
            <div>
                <h3 class="font-black text-2xl text-white tracking-tighter">THE RECIPE LIST</h3>
                <p class="text-[10px] text-orange-500 font-bold uppercase tracking-[0.2em]">ROUND 1 - APRIL 2026</p>
            </div>
            <button onclick="toggleSidebar()" class="p-3 bg-gray-800 rounded-2xl text-gray-300">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>
        <div id="syllabus-list" class="flex-1 overflow-y-auto p-6 space-y-4 custom-scrollbar">
            <!-- List injected by JS -->
        </div>
    </div>

    <script>
        // --- CONTENT DATA ---
        const courseData = {
            title: "AI MASTERCHEF: ESSENTIALS",
            round: "ROUND 1 - APRIL 2026",
            lessons: [
                {
                    id: 0,
                    title: "Case Study: Narrative Impact",
                    duration: "08:14",
                    youtubeId: "IEwgJfQ0MKE",
                    category: "Analysis",
                    description: "In this foundational case study, we analyze the emotional arc and narrative structure of high-impact visual storytelling. Understanding how to build tension and resolve conflict is essential for creating AI-generated content that resonates.",
                    outcomes: ["Narrative Arc Mapping", "Visual Pacing", "Emotional Design"]
                },
                {
                    id: 1,
                    title: "Kitchen Setup: Agentic AI",
                    duration: "07:19",
                    youtubeId: "EDb37y_MhRw", 
                    category: "Ingredients",
                    description: "Explore the difference between standard Generative AI and advanced Agentic AI workflows. Understanding how AI agents collaborate is the 'secret sauce' to winning.",
                    outcomes: ["GenAI vs Agentic", "Collaboration Logic", "Goal-Oriented Prompting"]
                },
                {
                    id: 2,
                    title: "Knife Skills: Prompting",
                    duration: "14:20",
                    youtubeId: "jNQXAC9IVRw",
                    category: "The Recipe",
                    description: "Technique is everything. Learn the LAPA structural framework for prompt engineering that ensures your outputs are consistently high-quality.",
                    outcomes: ["Zero-Shot vs Few-Shot", "Eliminating Hallucinations", "Context Management"]
                }
            ]
        };

        let activeLessonIdx = 0;
        let completedLessons = new Set([0]);

        // --- DOM ELEMENTS ---
        const els = {
            title: document.getElementById('lesson-title'),
            desc: document.getElementById('lesson-description'),
            cat: document.getElementById('lesson-category'),
            module: document.getElementById('lesson-module-tag'),
            dur: document.getElementById('lesson-duration'),
            outcomes: document.getElementById('lesson-outcomes'),
            video: document.getElementById('video-placeholder'),
            ytLink: document.getElementById('youtube-link'),
            completeBtn: document.getElementById('complete-btn'),
            sidebar: document.getElementById('sidebar'),
            overlay: document.getElementById('sidebar-overlay'),
            syllabus: document.getElementById('syllabus-list'),
            progressTop: document.getElementById('progress-bar-top'),
            progressText: document.getElementById('progress-text-top'),
            progressMobile: document.getElementById('progress-bar-mobile')
        };

        // --- FUNCTIONS ---
        function renderLesson() {
            const lesson = courseData.lessons[activeLessonIdx];
            els.title.innerText = lesson.title;
            els.desc.innerText = lesson.description;
            els.cat.innerText = lesson.category;
            els.module.innerText = `Module ${lesson.id + 1}`;
            els.dur.innerText = lesson.duration;
            els.ytLink.href = `https://www.youtube.com/watch?v=${lesson.youtubeId}`;
            
            // Render Video
            els.video.innerHTML = `<iframe src="https://www.youtube-nocookie.com/embed/${lesson.youtubeId}?rel=0&modestbranding=1" frameborder="0" allowfullscreen></iframe>`;
            
            // Render Outcomes
            els.outcomes.innerHTML = lesson.outcomes.map(o => `
                <li class="flex items-center gap-3 bg-[#121212] p-3 rounded-xl border border-gray-800">
                    <i class="fas fa-check-circle text-cyan-500"></i>
                    <span class="text-sm font-medium text-gray-200">${o}</span>
                </li>
            `).join('');

            updateButtons();
            renderSyllabus();
            updateProgress();
        }

        function renderSyllabus() {
            els.syllabus.innerHTML = courseData.lessons.map((l, idx) => `
                <button onclick="switchLesson(${idx})" class="w-full group flex items-center gap-4 p-4 rounded-2xl border transition-all ${activeLessonIdx === idx ? 'bg-cyan-500/10 border-cyan-500/50' : 'bg-[#121212] border-gray-800'}">
                    <div class="w-10 h-10 flex-shrink-0 rounded-xl flex items-center justify-center text-sm font-black ${completedLessons.has(idx) ? 'bg-cyan-500 text-white' : 'bg-gray-800 text-gray-500'}">
                        ${completedLessons.has(idx) ? '<i class="fas fa-check"></i>' : idx + 1}
                    </div>
                    <div class="text-left flex-1">
                        <p class="text-[10px] font-bold uppercase ${activeLessonIdx === idx ? 'text-cyan-400' : 'text-gray-500'}">${l.category}</p>
                        <p class="text-sm font-black text-white truncate">${l.title}</p>
                    </div>
                </button>
            `).join('');
        }

        function updateProgress() {
            const percent = Math.round((completedLessons.size / courseData.lessons.length) * 100);
            els.progressTop.style.width = percent + '%';
            els.progressMobile.style.width = percent + '%';
            els.progressText.innerText = percent + '%';
        }

        function updateButtons() {
            if (completedLessons.has(activeLessonIdx)) {
                els.completeBtn.innerHTML = `<i class="fas fa-check-circle"></i> Lesson Mastered`;
                els.completeBtn.className = "w-full flex items-center justify-center gap-3 py-4 rounded-2xl font-black text-lg bg-gray-800 text-gray-500 border border-gray-700 cursor-default shadow-none";
                els.completeBtn.disabled = true;
            } else {
                els.completeBtn.innerHTML = `<i class="fas fa-play"></i> Mark as Completed`;
                els.completeBtn.className = "w-full flex items-center justify-center gap-3 py-4 rounded-2xl font-black text-lg bg-gradient-to-r from-cyan-500 to-blue-600 text-white shadow-cyan-500/40 transform transition-all active:scale-95";
                els.completeBtn.disabled = false;
            }
        }

        function switchLesson(idx) {
            activeLessonIdx = idx;
            renderLesson();
            toggleSidebar(false);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function markCompleted() {
            completedLessons.add(activeLessonIdx);
            renderLesson();
        }

        function toggleSidebar(force) {
            const isOpen = force !== undefined ? force : els.sidebar.classList.contains('translate-x-full');
            if (isOpen) {
                els.sidebar.classList.remove('translate-x-full');
                els.overlay.classList.remove('hidden');
                setTimeout(() => els.overlay.classList.add('opacity-100'), 10);
            } else {
                els.sidebar.classList.add('translate-x-full');
                els.overlay.classList.remove('opacity-100');
                setTimeout(() => els.overlay.classList.add('hidden'), 300);
            }
        }

        // Init
        window.onload = renderLesson;
    </script>
</body>
</html>
